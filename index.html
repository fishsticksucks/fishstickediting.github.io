<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fishstick editing</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --border: #e6e8eb;
      --border2: #d5d9de;
      --text: #111418;
      --text2: #5c6670;
      --text3: #9aa3ab;
      --accent: #1D9E75;
      --radius: 12px;
      --shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --bg: #0f1113;
      --surface: #171a1d;
      --surface2: #1f2327;
      --border: #262a2f;
      --border2: #30363d;
      --text: #e6e9ed;
      --text2: #9aa4af;
      --text3: #5c6670;
      --accent: #2ad39b;
      --shadow: 0 6px 18px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 10;
    }
    [data-theme="dark"] .nav { background: rgba(15,17,19,0.75); }
    .nav-logo { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; color: var(--text); }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: var(--radius); }
    .tab-btn {
      font-size: 13px; padding: 6px 14px; border: none; border-radius: 8px;
      background: transparent; color: var(--text2); cursor: pointer;
      font-family: inherit; transition: all 0.2s ease;
    }
    .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .tab-btn:hover { color: var(--text); }
    button:active { transform: scale(0.97); }

    .dark-toggle {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .dark-toggle:hover { background: var(--surface2); color: var(--text); }

    .page { display: none; padding: 32px 24px; max-width: 820px; margin: 0 auto; }
    .page.active { display: block; }

    .lock-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; gap: 10px;
    }
    .lock-wrap h2 { font-size: 20px; font-weight: 600; }
    .lock-wrap p { font-size: 14px; color: var(--text2); }
    .lock-row { display: flex; gap: 8px; margin-top: 8px; }
    .lock-row input {
      width: 230px; font-family: inherit; background: var(--surface);
      color: var(--text); border: 1px solid var(--border2);
      border-radius: 10px; padding: 9px 12px; font-size: 14px;
    }
    .lock-row input:focus { outline: none; border-color: var(--accent); }
    .err { font-size: 13px; color: #c0392b; display: none; margin-top: 4px; }

    .add-form {
      background: var(--surface2); border-radius: var(--radius);
      padding: 20px; margin-bottom: 28px; border: 1px solid var(--border);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .add-form input[type="text"], .add-form input[type="number"] {
      font-family: inherit; font-size: 14px; background: var(--surface);
      color: var(--text); border: 1px solid var(--border2);
      border-radius: 10px; padding: 9px 11px; width: 100%;
    }
    .add-form input:focus { outline: none; border-color: var(--accent); }
    .time-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 6px; }
    .time-inputs input { text-align: center; }
    .time-labels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .time-label { font-size: 11px; color: var(--text3); text-align: center; }
    .submit-row { display: flex; justify-content: flex-end; }
    .btn-primary {
      padding: 9px 20px; border-radius: 10px; border: none;
      background: var(--accent); color: white; font-size: 14px;
      font-weight: 500; cursor: pointer; font-family: inherit;
      transition: all 0.2s ease;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-head h2 { font-size: 15px; font-weight: 600; }
    .sync-dot {
      font-size: 12px; color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }
    .sync-dot::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3); display: inline-block;
    }
    .sync-dot.ok::before { background: var(--accent); }
    .sync-dot.err::before { background: #e74c3c; }

    .jobs-list { display: flex; flex-direction: column; gap: 12px; }
    .job-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: fadeIn 0.3s ease;
    }
    .job-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.09); }
    .job-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .job-client { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
    .job-title { font-size: 15px; font-weight: 600; }
    .cd-badge { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .cd-ok   { background: #EAF3DE; color: #27500A; }
    .cd-soon { background: #FAEEDA; color: #633806; }
    .cd-done { background: #FCEBEB; color: #791F1F; }

    .job-controls {
      display: flex; align-items: center; gap: 6px;
      padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .ctrl-label { font-size: 12px; color: var(--text2); }
    .time-btn {
      font-size: 12px; padding: 5px 11px; border: 1px solid var(--border2);
      border-radius: 8px; background: transparent; color: var(--text);
      cursor: pointer; font-family: inherit; transition: background 0.12s;
    }
    .time-btn:hover { background: var(--surface2); }
    .del-btn {
      margin-left: auto; font-size: 12px; padding: 5px 11px;
      border: 1px solid #f09595; border-radius: 8px;
      background: transparent; color: #c0392b; cursor: pointer; font-family: inherit;
    }
    .del-btn:hover { background: #FCEBEB; }

    .client-header { margin-bottom: 28px; }
    .client-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .client-header p { font-size: 15px; color: var(--text2); }

    .c-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px; margin-bottom: 14px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: fadeIn 0.3s ease;
    }
    .c-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.09); }
    .c-client { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .c-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .c-timer {
      font-size: 38px; font-weight: 700; letter-spacing: -2px;
      font-variant-numeric: tabular-nums; color: var(--text);
      transition: color 0.3s;
    }
    .c-timer.soon { color: #d68910; }
    .c-timer.done { color: #c0392b; }
    .c-eta { font-size: 12px; color: var(--text3); margin-top: 8px; }

    .empty { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--text3); }
    .loading { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--text3); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .c-timer { font-size: 30px; }
      .nav { padding: 12px 16px; }
      .page { padding: 20px 16px; }
    }
  
    /* ── MODERN / GLASS / MOTION UPGRADES ─────────────────────────────── */
    body {
      background:
        radial-gradient(circle at top left, rgba(29, 158, 117, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(29, 158, 117, 0.07), transparent 26%),
        linear-gradient(135deg, #f6f8fb 0%, #edf2f6 100%);
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(circle at top left, rgba(42, 211, 155, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(42, 211, 155, 0.06), transparent 26%),
        linear-gradient(135deg, #0f1113 0%, #15181d 100%);
    }

    .nav {
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    [data-theme="dark"] .nav {
      background: rgba(20, 20, 20, 0.68);
    }

    .c-card, .job-card, .add-form, .lock-wrap, .c-eta, .empty {
      animation: fadeInUp 0.42s ease both;
    }

    .c-card, .job-card, .add-form, .lock-wrap {
      background: rgba(255, 255, 255, 0.64);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
    }
    [data-theme="dark"] .c-card,
    [data-theme="dark"] .job-card,
    [data-theme="dark"] .add-form,
    [data-theme="dark"] .lock-wrap {
      background: rgba(25, 28, 33, 0.58);
      border-color: rgba(255,255,255,0.08);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .c-card, .job-card {
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .c-card:hover, .job-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(16, 24, 40, 0.12);
    }

    .c-timer {
      transition: transform 0.24s ease, opacity 0.24s ease;
      display: inline-block;
    }
    .c-timer.tick {
      transform: scale(1.035);
      opacity: 0.92;
    }

    .fade-in {
      animation: fadeInUp 0.36s ease both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
      background: rgba(15, 23, 42, 0.08);
    }
    [data-theme="dark"] .progress {
      background: rgba(255, 255, 255, 0.08);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), rgba(42, 211, 155, 0.65));
      transition: width 0.5s ease;
    }

    .cd-badge {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    .sync-dot.ok { color: #1d9e75; }
    .sync-dot.err { color: #b45309; }

    .loading {
      text-align: center;
      padding: 44px 16px;
      color: var(--text3);
      animation: pulseSoft 1.4s ease-in-out infinite;
    }
    @keyframes pulseSoft {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

  </style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">fishstick <span>editing</span></div>
  <div class="nav-right">
    <div class="nav-tabs">
      <button class="tab-btn active" id="tab-client" onclick="switchTab('client')">client view</button>
      <button class="tab-btn" id="tab-admin" onclick="switchTab('admin')">control panel</button>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" id="theme-btn" title="Toggle dark mode">🌙</button>
  </div>
</div>

<!-- CLIENT PAGE -->
<div id="page-client" class="page active">
  <div class="client-header">
    <h2>Your video status</h2>
    <p>Estimated time remaining on your video.</p>
  </div>
  <div id="client-list"><div class="loading">loading...</div></div>
</div>

<!-- ADMIN PAGE -->
<div id="page-admin" class="page">
    <div id="lock-screen" class="lock-wrap">
        <h2>Control Panel</h2>
        <p>Login to manage jobs</p>

        <div class="lock-row" style="flex-direction:column; gap:10px;">
            <input id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()" />
            <button class="tab-btn active" onclick="tryLogin()">Login</button>
        </div>

        <div class="err" id="pw-err">login failed</div>
    </div>

    <div id="admin-panel" style="display:none;">
        <div class="section-head" style="margin-bottom:16px;">
            <h2>add new job</h2>
            <button class="tab-btn" onclick="logout()" style="font-size:12px;">lock</button>
        </div>

        <div class="add-form">
            <div class="form-grid">
                <div class="field-group">
                    <div class="field-label">client name</div>
                    <input type="text" id="f-client" placeholder="e.g. Alex Johnson" />
                </div>
                <div class="field-group">
                    <div class="field-label">video title</div>
                    <input type="text" id="f-title" placeholder="e.g. Vlog #12" />
                </div>
            </div>
            <div class="field-label" style="margin-bottom:8px;">estimated time remaining</div>
            <div class="time-inputs">
                <input type="number" id="f-days" placeholder="0" min="0" />
                <input type="number" id="f-hours" placeholder="0" min="0" max="23" />
                <input type="number" id="f-mins" placeholder="0" min="0" max="59" />
            </div>
            <div class="time-labels">
                <div class="time-label">days</div>
                <div class="time-label">hours</div>
                <div class="time-label">minutes</div>
            </div>
            <div class="submit-row">
                <button class="btn-primary" onclick="addJob()">add job</button>
            </div>
        </div>

        <div class="section-head">
            <h2>active jobs</h2>
            <span class="sync-dot" id="sync-status">loading</span>
        </div>
        <div id="admin-list" class="jobs-list"></div>
    </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const SUPABASE_URL = "https://lpnqirboiijezxgruzks.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwbnFpcmJvaWlqZXp4Z3J1emtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDg5NzksImV4cCI6MjA5MDYyNDk3OX0.15MIHCIDL13z_tlZbE-uN_Ac1Oa9cQk2jo-bdI2weXc";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------------- AUTH ---------------- */

async function tryLogin() {
  console.log("LOGIN CLICKED");
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  const err = document.getElementById('pw-err');

  if (error) {
    err.style.display = 'block';
    err.textContent = "login failed";
    return;
  }

  showAdmin();
}

async function logout() {
  await supabase.auth.signOut();
  showLock();
}

async function checkUser() {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    showAdmin();
  } else {
    showLock();
  }
}

function showAdmin() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
}

function showLock() {
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
}

/* ---------------- UI ---------------- */

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function toggleDark() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

/* ---------------- INIT ---------------- */

checkUser();

/* expose to HTML */
window.switchTab = switchTab;
window.tryLogin = tryLogin;
window.logout = logout;
window.toggleDark = toggleDark;

});
</script>
